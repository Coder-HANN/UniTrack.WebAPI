name: Backend CI-CD

on:
  push:
    branches: [ "main" ] # Main branch'e push geldiğinde tetiklenir

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: . # En dış dizinden (UniTrack-Backend) başla
          file: ./Dockerfile # Kök dizindeki Dockerfile'ı kullan
          push: true
          # İmajı hem versiyonlu (prod) hem de en güncel (latest) olarak işaretle
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/unitrack-backend:prod
            ${{ secrets.DOCKERHUB_USERNAME }}/unitrack-backend:latest